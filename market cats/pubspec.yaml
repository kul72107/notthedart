name: meowverse_flutter_v2
description: "MeowVerse Flutter v2 - native 1:1 app port without WebView fallback modes."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Routing
  go_router: ^14.6.0

  # State
  provider: ^6.1.2

  # Storage
  shared_preferences: ^2.3.3

  # Networking
  dio: ^5.7.0

  # Deep link auth + external auth browser
  app_links: ^6.3.2
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/fonts/

  fonts:
    - family: Big Dazzle
      fonts:
        - asset: assets/fonts/BIG-DAZZLE.ttf
          weight: 400
